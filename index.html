<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Open Obsidian Link</title>

<script>

function getParam(name){
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

function openObsidian(){

  const url = getParam("url");

  if(!url){
    document.body.innerHTML = "<h2>No se recibió ningún enlace de Obsidian</h2>";
    return;
  }

  if(!url.startsWith("obsidian://")){
    document.body.innerHTML = "<h2>El enlace no es válido</h2>";
    return;
  }

  window.location.href = url;

}

window.onload = openObsidian;

</script>

</head>

<body style="font-family:Arial;text-align:center;margin-top:80px">

<h2>Abriendo Obsidian...</h2>

</body>
</html>
